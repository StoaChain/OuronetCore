name: Publish to npmjs.org

# Triggered by pushing a version tag (e.g. v1.2.0).
# Publishes this package to the public npmjs.org registry under the
# @stoachain scope so OuronetUI, HUB, and any other consumer can
# `npm install @stoachain/ouronet-core@^X.Y.Z` without auth.
#
# Switched from GitHub Packages → npmjs.org at v1.2.0 because
# GitHub Packages requires a PAT even for "public" scoped packages,
# which complicated every consumer's setup (Ploi, local dev, team
# laptops). npmjs.org is the standard public JS registry — zero
# auth needed for install; auth only needed on OUR side for publish.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-node writes a scratch .npmrc in the runner's HOME that
      # points @stoachain resolution at npmjs.org and sets the auth
      # token from ${NODE_AUTH_TOKEN}. Consumers installing this
      # package don't need any of this — the registry is the default
      # npm registry, so `npm install @stoachain/ouronet-core` works
      # out of the box anywhere.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@stoachain"

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      # Belt-and-suspenders: tests + build gate the publish so a broken
      # core never makes it to the registry. The `prepare` script also
      # builds dist/ pre-publish — redundant and intentional.
      - name: Typecheck + Test + Build
        run: |
          npm run typecheck
          npm test
          npm run build

      # Verify the tag matches the package.json version — reject
      # mismatched tags so we don't publish v1.2.0 from a tag that
      # says v1.2.1 (or vice versa).
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag $TAG_VERSION matches package.json — proceeding"

      # Publishes to npmjs.org. `--access public` is required on the
      # first publish of a scoped package (@stoachain/...) — npm's
      # default is restricted for scoped packages. Our publishConfig
      # in package.json also sets "access": "public" as belt-and-braces.
      - name: Publish to npmjs.org
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
